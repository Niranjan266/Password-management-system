<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}VaultX — Password Manager{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-base:#080B14;--bg-surface:#0E1422;--bg-card:#131929;--bg-hover:#1A2235;
  --border:#1E2D47;--border-bright:#2A3F5F;
  --accent:#4F8EFF;--accent-dim:#1E3A6E;--accent-glow:rgba(79,142,255,0.18);
  --teal:#0FD4C1;--purple:#8B5CF6;--rose:#F43F5E;--amber:#F59E0B;--green:#10B981;
  --text-primary:#EEF2FF;--text-secondary:#8899B4;--text-muted:#4A5A78;
  --radius:12px;--radius-lg:18px;--shadow:0 4px 24px rgba(0,0,0,0.5);
  --font-display:'Space Grotesk',sans-serif;--font-body:'Inter',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ── KEYFRAMES ─────────────────────────────── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(80px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideOutRight{from{opacity:1;transform:translateX(0);max-height:200px}to{opacity:0;transform:translateX(110%);max-height:0;padding:0;margin-bottom:0}}
@keyframes slideInDown{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.88)}to{opacity:1;transform:scale(1)}}
@keyframes bounceIn{0%{opacity:0;transform:scale(0.72)}55%{opacity:1;transform:scale(1.04)}75%{transform:scale(0.97)}100%{transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes logoPulse{0%,100%{box-shadow:0 0 18px var(--accent-glow)}50%{box-shadow:0 0 38px rgba(79,142,255,.45),0 0 60px rgba(15,212,193,.15)}}
@keyframes navStagger{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:translateX(0)}}
@keyframes progressShrink{from{width:100%}to{width:0%}}
@keyframes shimmerMove{0%{background-position:-400px 0}100%{background-position:400px 0}}
@keyframes cardPop{0%{opacity:0;transform:translateY(18px) scale(.97)}60%{opacity:1;transform:translateY(-3px) scale(1.005)}100%{transform:translateY(0) scale(1)}}
@keyframes topbarSlide{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes dotBlink{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes ripple{0%{transform:scale(0);opacity:.5}100%{transform:scale(3);opacity:0}}
@keyframes statCount{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* ── BASE ──────────────────────────────────── */
body{font-family:var(--font-body);background:var(--bg-base);color:var(--text-primary);min-height:100vh;line-height:1.6;animation:fadeIn .35s ease}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg-base)}::-webkit-scrollbar-thumb{background:var(--border-bright);border-radius:3px}
.app-layout{display:flex;min-height:100vh}

/* ── SIDEBAR ───────────────────────────────── */
.sidebar{width:260px;min-width:260px;background:var(--bg-surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;animation:slideInDown .4s ease both}
.sidebar-logo{padding:24px 20px 20px;border-bottom:1px solid var(--border)}
.logo-mark{display:flex;align-items:center;gap:10px;font-family:var(--font-display);font-size:20px;font-weight:700;color:var(--text-primary);text-decoration:none}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--teal));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;animation:logoPulse 3s ease-in-out infinite;transition:transform .2s}
.logo-icon:hover{transform:rotate(-5deg) scale(1.1)}
.logo-sub{font-size:11px;font-weight:400;color:var(--text-muted);letter-spacing:.05em;display:block;line-height:1;margin-top:2px}
.sidebar-user{padding:16px 20px;border-bottom:1px solid var(--border)}
.user-pill{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg-card);border-radius:var(--radius);border:1px solid var(--border);transition:border-color .2s,box-shadow .2s;animation:fadeInUp .4s .1s ease both}
.user-pill:hover{border-color:var(--border-bright);box-shadow:0 0 0 2px var(--accent-glow)}
.user-avatar{width:32px;height:32px;background:linear-gradient(135deg,var(--purple),var(--accent));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#fff;flex-shrink:0;animation:float 4s ease-in-out infinite}
.user-info{flex:1;min-width:0}
.user-name{font-size:13px;font-weight:600;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-role{font-size:11px;color:var(--text-muted)}
.sidebar-nav{flex:1;padding:16px 12px;overflow-y:auto}
.nav-section-label{font-size:10px;font-weight:600;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;padding:0 8px;margin-bottom:6px;margin-top:16px}
.nav-section-label:first-child{margin-top:0}
.nav-link{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;color:var(--text-secondary);text-decoration:none;font-size:13.5px;font-weight:500;transition:all .18s cubic-bezier(.4,0,.2,1);margin-bottom:2px;cursor:pointer;border:none;background:none;width:100%;text-align:left;position:relative;overflow:hidden;animation:navStagger .35s ease both}
.nav-link:nth-child(1){animation-delay:.05s}.nav-link:nth-child(2){animation-delay:.10s}.nav-link:nth-child(3){animation-delay:.15s}.nav-link:nth-child(4){animation-delay:.20s}.nav-link:nth-child(5){animation-delay:.25s}.nav-link:nth-child(6){animation-delay:.30s}.nav-link:nth-child(7){animation-delay:.35s}.nav-link:nth-child(8){animation-delay:.40s}.nav-link:nth-child(9){animation-delay:.45s}.nav-link:nth-child(10){animation-delay:.50s}
.nav-link:hover{background:var(--bg-hover);color:var(--text-primary);transform:translateX(3px)}
.nav-link.active{background:var(--accent-dim);color:var(--accent)}
.nav-link .nav-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0;transition:transform .2s}
.nav-link:hover .nav-icon{transform:scale(1.15)}
.nav-link .nav-badge{margin-left:auto;background:var(--accent);color:#fff;font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;min-width:20px;text-align:center;animation:pulse 2s infinite}
.sidebar-footer{padding:16px 12px;border-top:1px solid var(--border)}

/* ── MAIN ──────────────────────────────────── */
.main-content{margin-left:260px;flex:1;min-height:100vh;display:flex;flex-direction:column;animation:fadeIn .4s .1s ease both}
.topbar{background:var(--bg-surface);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:50;animation:topbarSlide .35s ease both;backdrop-filter:blur(12px)}
.topbar-title{font-family:var(--font-display);font-size:17px;font-weight:600;color:var(--text-primary);flex:1}
.page-body{padding:28px;flex:1}

/* ── SEARCH ────────────────────────────────── */
.search-wrap{position:relative;flex:1;max-width:380px}
.search-wrap input{width:100%;background:var(--bg-card);border:1px solid var(--border);border-radius:9px;padding:9px 14px 9px 38px;color:var(--text-primary);font-size:13px;font-family:var(--font-body);transition:border-color .25s,box-shadow .25s,background .25s;outline:none}
.search-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);background:var(--bg-hover)}
.search-wrap input::placeholder{color:var(--text-muted)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:14px;pointer-events:none;transition:color .2s}
.search-wrap:focus-within .search-icon{color:var(--accent)}

/* ── BUTTONS ───────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:9px;font-size:13.5px;font-weight:600;font-family:var(--font-body);cursor:pointer;transition:all .18s cubic-bezier(.4,0,.2,1);text-decoration:none;border:none;outline:none;position:relative;overflow:hidden}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 0 20px rgba(79,142,255,.3)}
.btn-primary:hover{background:#6BA3FF;box-shadow:0 0 32px rgba(79,142,255,.55);transform:translateY(-1px)}
.btn-primary:active{transform:translateY(0) scale(.98)}
.btn-secondary{background:var(--bg-card);color:var(--text-secondary);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--bg-hover);color:var(--text-primary);border-color:var(--border-bright)}
.btn-danger{background:transparent;color:var(--rose);border:1px solid rgba(244,63,94,.3)}
.btn-danger:hover{background:rgba(244,63,94,.1)}
.btn-ghost{background:transparent;color:var(--text-secondary);padding:7px 10px}
.btn-ghost:hover{color:var(--text-primary);background:var(--bg-hover)}
.btn-sm{padding:6px 13px;font-size:12.5px}
.btn-icon{padding:8px;border-radius:8px}

/* Loading state */
.btn-loading{pointer-events:none}
.btn-loading .btn-text{opacity:0}
.btn-spinner{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);gap:4px;align-items:center}
.btn-loading .btn-spinner{display:flex}
.btn-spinner span{width:5px;height:5px;background:#fff;border-radius:50%;animation:dotBlink 1.2s infinite ease-in-out both}
.btn-spinner span:nth-child(1){animation-delay:0s}
.btn-spinner span:nth-child(2){animation-delay:.2s}
.btn-spinner span:nth-child(3){animation-delay:.4s}

/* ── CARDS ─────────────────────────────────── */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;transition:border-color .2s,box-shadow .2s}
.card:hover{border-color:var(--border-bright)}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:28px}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px 22px;position:relative;overflow:hidden;transition:transform .25s,box-shadow .25s,border-color .25s;animation:cardPop .5s ease both}
.stat-card:nth-child(1){animation-delay:.05s}.stat-card:nth-child(2){animation-delay:.12s}.stat-card:nth-child(3){animation-delay:.19s}
.stat-card:hover{transform:translateY(-3px);box-shadow:0 10px 36px rgba(0,0,0,.4);border-color:var(--border-bright)}
.stat-card::before{content:'';position:absolute;top:0;right:0;width:100px;height:100px;border-radius:50%;opacity:.07;transform:translate(25px,-25px);transition:opacity .3s,transform .3s}
.stat-card:hover::before{opacity:.14;transform:translate(15px,-15px)}
.stat-card.blue::before{background:var(--accent)}.stat-card.teal::before{background:var(--teal)}.stat-card.purple::before{background:var(--purple)}
.stat-label{font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-bottom:8px}
.stat-value{font-family:var(--font-display);font-size:32px;font-weight:700;color:var(--text-primary);line-height:1;animation:statCount .5s ease both}
.stat-icon{position:absolute;top:18px;right:20px;font-size:22px;opacity:.5;transition:transform .3s}
.stat-card:hover .stat-icon{transform:scale(1.2) rotate(-5deg)}

/* ── CATEGORY ──────────────────────────────── */
.category-filter{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.cat-chip{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;text-decoration:none;transition:all .2s cubic-bezier(.34,1.56,.64,1);border:1px solid var(--border);background:var(--bg-card);color:var(--text-secondary)}
.cat-chip:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-2px)}
.cat-chip.active{background:var(--accent-dim);color:var(--accent);border-color:var(--accent);transform:translateY(-1px);box-shadow:0 4px 14px rgba(79,142,255,.25)}
.quick-platform-logo{width:18px;height:18px;object-fit:contain;border-radius:4px;vertical-align:middle}

/* ── PASSWORD GRID ─────────────────────────── */
.pwd-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.pwd-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;transition:all .22s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;animation:cardPop .5s ease both}
.pwd-card:nth-child(1){animation-delay:.04s}.pwd-card:nth-child(2){animation-delay:.08s}.pwd-card:nth-child(3){animation-delay:.12s}.pwd-card:nth-child(4){animation-delay:.16s}.pwd-card:nth-child(5){animation-delay:.20s}.pwd-card:nth-child(6){animation-delay:.24s}.pwd-card:nth-child(7){animation-delay:.28s}.pwd-card:nth-child(8){animation-delay:.32s}.pwd-card:nth-child(9){animation-delay:.36s}.pwd-card:nth-child(10){animation-delay:.40s}
.pwd-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--card-accent,var(--accent));opacity:0;transition:opacity .25s}
.pwd-card:hover{border-color:var(--border-bright);transform:translateY(-3px);box-shadow:0 10px 36px rgba(0,0,0,.45)}
.pwd-card:hover::before{opacity:1}
.pwd-card-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px}
.pwd-platform-icon{width:42px;height:42px;background:var(--bg-hover);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;border:1px solid var(--border);transition:transform .2s,box-shadow .2s}
.pwd-card:hover .pwd-platform-icon{transform:scale(1.08);box-shadow:0 4px 16px rgba(0,0,0,.4)}
.pwd-platform-logo{width:100%;height:100%;object-fit:cover;border-radius:10px}
.pwd-platform-info{flex:1;min-width:0}
.pwd-platform-name{font-size:15px;font-weight:600;color:var(--text-primary);font-family:var(--font-display);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pwd-category-badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;margin-top:3px;text-transform:uppercase;letter-spacing:.06em}
.pwd-actions{display:flex;gap:4px;margin-left:auto}
.action-btn{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;background:transparent;border:none;color:var(--text-muted);transition:all .18s cubic-bezier(.34,1.56,.64,1);text-decoration:none}
.action-btn:hover{background:var(--bg-hover);color:var(--text-secondary);transform:scale(1.15)}
.action-btn.fav-active{color:var(--amber)}
.action-btn.fav-active:hover{color:var(--amber);transform:scale(1.2) rotate(-5deg)}
.pwd-field{background:var(--bg-surface);border:1px solid var(--border);border-radius:9px;padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:8px;transition:border-color .2s,background .2s}
.pwd-field:hover{border-color:var(--border-bright);background:var(--bg-hover)}
.pwd-field-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.07em;font-weight:600;margin-bottom:2px}
.pwd-field-value{font-size:13px;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.pwd-masked{font-family:monospace;letter-spacing:3px;color:var(--text-muted)}
.copy-btn{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:12px;padding:4px;border-radius:5px;transition:all .2s cubic-bezier(.34,1.56,.64,1);flex-shrink:0}
.copy-btn:hover{color:var(--accent);background:var(--accent-dim);transform:scale(1.2)}
.copy-btn.copied{color:var(--green);background:rgba(16,185,129,.15);transform:scale(1.2)}
.pwd-url{font-size:12px;color:var(--accent);text-decoration:none;display:inline-flex;align-items:center;gap:4px;margin-top:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;transition:color .15s}
.pwd-url:hover{text-decoration:underline;color:#6BA3FF}

/* ── FORMS ─────────────────────────────────── */
.form-page{max-width:580px;margin:0 auto}
.form-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:32px;animation:fadeInUp .45s ease both}
.form-title{font-family:var(--font-display);font-size:22px;font-weight:700;margin-bottom:24px;color:var(--text-primary);display:flex;align-items:center;gap:10px}
.form-row{margin-bottom:18px;animation:fadeInUp .4s ease both}
.form-row:nth-child(1){animation-delay:.06s}.form-row:nth-child(2){animation-delay:.10s}.form-row:nth-child(3){animation-delay:.14s}.form-row:nth-child(4){animation-delay:.18s}.form-row:nth-child(5){animation-delay:.22s}.form-row:nth-child(6){animation-delay:.26s}.form-row:nth-child(7){animation-delay:.30s}.form-row:nth-child(8){animation-delay:.34s}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
label{display:block;font-size:12.5px;font-weight:600;color:var(--text-secondary);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em;transition:color .2s}
.form-row:focus-within > label{color:var(--accent)}
input[type="text"],input[type="password"],input[type="email"],input[type="url"],select,textarea{width:100%;background:var(--bg-surface);border:1px solid var(--border);border-radius:9px;padding:11px 14px;color:var(--text-primary);font-size:14px;font-family:var(--font-body);transition:border-color .25s,box-shadow .25s,background .25s,transform .15s;outline:none;appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow),0 2px 12px rgba(0,0,0,.2);background:var(--bg-hover);transform:translateY(-1px)}
input:hover:not(:focus),select:hover:not(:focus),textarea:hover:not(:focus){border-color:var(--border-bright)}
input::placeholder,textarea::placeholder{color:var(--text-muted)}
select option{background:var(--bg-card)}
textarea{resize:vertical;min-height:90px}
.input-with-btn{position:relative}
.input-with-btn input{padding-right:44px}
.input-inner-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:14px;padding:4px 6px;border-radius:6px;transition:color .15s,transform .2s}
.input-inner-btn:hover{color:var(--accent);transform:translateY(-50%) scale(1.15)}
.form-actions{display:flex;gap:12px;padding-top:8px}
.checkbox-row{display:flex;align-items:center;gap:10px;cursor:pointer}
.checkbox-row input[type="checkbox"]{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;transition:transform .2s}
.checkbox-row:hover input[type="checkbox"]{transform:scale(1.1)}
.checkbox-row span{font-size:13.5px;color:var(--text-secondary);font-weight:500;user-select:none}
.error-msg{color:var(--rose);font-size:12px;margin-top:5px;animation:fadeInUp .3s ease}
.errorlist{list-style:none;margin:0;padding:0}
.errorlist li{color:var(--rose);font-size:12px;margin-top:4px;animation:fadeInUp .3s ease}

/* ── AUTH ──────────────────────────────────── */
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg-base);padding:20px;position:relative;overflow:hidden}
.auth-bg-glow{position:absolute;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(79,142,255,.07),transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;animation:pulse 6s ease-in-out infinite}
.auth-orb{position:absolute;border-radius:50%;filter:blur(60px);pointer-events:none;animation:float 8s ease-in-out infinite}
.auth-orb-1{width:300px;height:300px;background:rgba(79,142,255,.06);top:-60px;left:-80px;animation-delay:0s}
.auth-orb-2{width:250px;height:250px;background:rgba(139,92,246,.06);bottom:-40px;right:-60px;animation-delay:-4s}
.auth-orb-3{width:180px;height:180px;background:rgba(15,212,193,.05);top:30%;right:15%;animation-delay:-2s}
.auth-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:24px;padding:40px;width:100%;max-width:440px;position:relative;box-shadow:0 24px 80px rgba(0,0,0,.6);animation:bounceIn .55s cubic-bezier(.34,1.56,.64,1) both;backdrop-filter:blur(20px)}
.auth-logo{text-align:center;margin-bottom:28px}
.auth-logo .logo-mark{justify-content:center;font-size:22px;margin-bottom:6px}
.auth-logo-desc{font-size:13px;color:var(--text-muted)}
.auth-title{font-family:var(--font-display);font-size:22px;font-weight:700;margin-bottom:6px;color:var(--text-primary);animation:fadeInUp .4s .2s ease both}
.auth-subtitle{font-size:13.5px;color:var(--text-secondary);margin-bottom:28px;animation:fadeInUp .4s .25s ease both}
.auth-footer-link{text-align:center;margin-top:22px;font-size:13px;color:var(--text-muted);animation:fadeInUp .4s .5s ease both}
.auth-footer-link a{color:var(--accent);text-decoration:none;font-weight:600;transition:color .2s}
.auth-footer-link a:hover{text-decoration:underline;color:#6BA3FF}

/* ── POPUP SYSTEM ──────────────────────────── */
.popup-container{position:fixed;top:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:10px;max-width:370px;width:100%;pointer-events:none}
.popup{background:rgba(19,25,41,.97);border:1px solid var(--border-bright);border-radius:14px;box-shadow:0 12px 48px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.04);overflow:hidden;pointer-events:all;animation:slideInRight .4s cubic-bezier(.34,1.56,.64,1) both;backdrop-filter:blur(16px)}
.popup.removing{animation:slideOutRight .3s ease forwards}
.popup-inner{display:flex;align-items:flex-start;gap:12px;padding:14px 16px}
.popup-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.popup-content{flex:1;min-width:0}
.popup-title{font-size:13px;font-weight:700;color:var(--text-primary);margin-bottom:2px}
.popup-msg{font-size:12.5px;color:var(--text-secondary);line-height:1.45}
.popup-close{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:18px;padding:0;line-height:1;flex-shrink:0;transition:all .2s;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:6px}
.popup-close:hover{color:var(--text-primary);background:var(--bg-hover)}
.popup-progress{height:3px;width:100%;background:rgba(255,255,255,.05)}
.popup-bar{height:100%;animation:progressShrink 4.5s linear forwards}
.popup.success{border-color:rgba(16,185,129,.35)}.popup.success .popup-icon{background:rgba(16,185,129,.15);color:#34D399}.popup.success .popup-title{color:#34D399}.popup.success .popup-bar{background:#34D399}
.popup.error{border-color:rgba(244,63,94,.35)}.popup.error .popup-icon{background:rgba(244,63,94,.15);color:#FB7185}.popup.error .popup-title{color:#FB7185}.popup.error .popup-bar{background:#FB7185}
.popup.info{border-color:rgba(79,142,255,.35)}.popup.info .popup-icon{background:rgba(79,142,255,.15);color:#7BA5FF}.popup.info .popup-title{color:#7BA5FF}.popup.info .popup-bar{background:#7BA5FF}
.popup.warning{border-color:rgba(245,158,11,.35)}.popup.warning .popup-icon{background:rgba(245,158,11,.15);color:#FBBF24}.popup.warning .popup-title{color:#FBBF24}.popup.warning .popup-bar{background:#FBBF24}

/* ── TOAST (legacy) ────────────────────────── */
.toast-container{position:fixed;bottom:24px;right:24px;z-index:9998;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--bg-card);border:1px solid var(--border-bright);border-radius:12px;padding:12px 18px;font-size:13px;font-weight:500;color:var(--text-primary);box-shadow:var(--shadow);display:flex;align-items:center;gap:8px;animation:slideInRight .3s ease;max-width:280px}
.toast.success{border-color:rgba(16,185,129,.4);color:#34D399}

/* ── MODAL ─────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .25s ease}
.modal{background:var(--bg-card);border:1px solid var(--border-bright);border-radius:var(--radius-lg);padding:28px;max-width:440px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,.7);animation:scaleIn .3s cubic-bezier(.34,1.56,.64,1) both}
.modal-title{font-family:var(--font-display);font-size:18px;font-weight:700;margin-bottom:8px;color:var(--text-primary)}
.modal-body{color:var(--text-secondary);font-size:14px;margin-bottom:24px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end}

/* ── PASSWORD STRENGTH ─────────────────────── */
.pwd-strength{margin-top:8px}
.pwd-strength-bar{display:flex;gap:3px;height:4px;border-radius:2px;overflow:hidden}
.pwd-strength-seg{flex:1;background:var(--border);border-radius:2px;transition:background .35s ease}
.pwd-strength-label{font-size:11px;color:var(--text-muted);margin-top:4px;transition:color .3s}

/* ── DATA SPACES ───────────────────────────── */
.space-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px}
.space-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;color:var(--text-primary);text-decoration:none;transition:all .22s cubic-bezier(.4,0,.2,1);animation:cardPop .5s ease both}
.space-card:nth-child(1){animation-delay:.04s}.space-card:nth-child(2){animation-delay:.08s}.space-card:nth-child(3){animation-delay:.12s}.space-card:nth-child(4){animation-delay:.16s}.space-card:nth-child(5){animation-delay:.20s}
.space-card:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:0 10px 36px rgba(0,0,0,.4)}
.space-card-head{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.space-card-image{width:52px;height:52px;object-fit:cover;border-radius:13px;border:1px solid var(--border);background:var(--bg-hover);transition:transform .2s}
.space-card:hover .space-card-image{transform:scale(1.05)}
.space-card-placeholder{width:52px;height:52px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:20px;font-weight:700;background:linear-gradient(135deg,var(--accent-dim),var(--purple));transition:transform .2s}
.space-card:hover .space-card-placeholder{transform:rotate(-3deg) scale(1.05)}
.space-name{font-family:var(--font-display);font-size:16px;font-weight:600}
.space-meta{color:var(--text-muted);font-size:12px}
.space-card-actions{display:flex;gap:8px;border-top:1px solid var(--border);padding-top:12px}

/* ── EDITOR ────────────────────────────────── */
.editor-shell{max-width:1100px;margin:0 auto;animation:fadeInUp .4s ease}
.note-editor{min-height:65vh;padding:22px;font-family:var(--font-body);line-height:1.8}
.note-editor:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow),0 4px 24px rgba(0,0,0,.3);transform:none}
.sheet-toolbar{display:flex;gap:8px;margin-bottom:12px;animation:fadeInUp .3s .1s ease both}
.sheet-wrap{overflow:auto;border:1px solid var(--border);border-radius:var(--radius);animation:fadeInUp .4s .15s ease both}
.data-sheet{width:100%;border-collapse:collapse;min-width:700px}
.data-sheet th{background:var(--bg-hover);color:var(--text-muted);font-size:11px;padding:8px;border:1px solid var(--border);min-width:160px}
.data-sheet td{border:1px solid var(--border);padding:0}
.data-sheet input{border:none;border-radius:0;box-shadow:none;background:var(--bg-surface);padding:11px;transform:none}
.data-sheet input:focus{box-shadow:inset 0 0 0 2px var(--accent)}

/* ── MISC ──────────────────────────────────── */
.empty-state{text-align:center;padding:60px 20px;color:var(--text-muted);animation:fadeInUp .5s ease}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:.5;animation:float 4s ease-in-out infinite}
.empty-title{font-size:18px;font-weight:600;color:var(--text-secondary);margin-bottom:8px}
.empty-desc{font-size:14px;margin-bottom:24px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;animation:fadeInUp .35s ease}
.section-title{font-family:var(--font-display);font-size:16px;font-weight:600;color:var(--text-primary);display:flex;align-items:center;gap:8px}
.section-count{font-size:12px;font-weight:600;color:var(--text-muted);background:var(--bg-hover);padding:2px 8px;border-radius:20px}
.divider{border:none;border-top:1px solid var(--border);margin:24px 0}
.messages-bar{padding:14px 28px 0}
.msg{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:9px;font-size:13.5px;font-weight:500;margin-bottom:8px}
.msg.success{background:rgba(16,185,129,.12);color:#34D399;border:1px solid rgba(16,185,129,.2)}
.msg.error{background:rgba(244,63,94,.12);color:#FB7185;border:1px solid rgba(244,63,94,.2)}
.msg.info{background:rgba(79,142,255,.12);color:#7BA5FF;border:1px solid rgba(79,142,255,.2)}

/* ── RESPONSIVE ────────────────────────────── */
@media(max-width:900px){.sidebar{width:220px;min-width:220px}.main-content{margin-left:220px}.stats-grid{grid-template-columns:1fr 1fr}.form-row-2{grid-template-columns:1fr}}
@media(max-width:640px){.sidebar{display:none}.main-content{margin-left:0}.stats-grid{grid-template-columns:1fr}.pwd-grid{grid-template-columns:1fr}.page-body{padding:16px}.popup-container{right:12px;top:12px;max-width:calc(100vw - 24px)}}
</style>
</head>
<body>
{% block body %}{% endblock %}

<div class="popup-container" id="popupContainer"></div>
<div class="toast-container" id="toastContainer"></div>

<script>
/* ── POPUP SYSTEM ──────────────────────────── */
const POPUP_ICONS={success:'✓',error:'✕',info:'ℹ',warning:'⚠'};
const POPUP_TITLES={success:'Success',error:'Error',info:'Notice',warning:'Warning'};

function showPopup(message,type='info',duration=4500){
  const container=document.getElementById('popupContainer');
  const popup=document.createElement('div');
  popup.className=`popup ${type}`;
  popup.innerHTML=`
    <div class="popup-inner">
      <div class="popup-icon">${POPUP_ICONS[type]||'ℹ'}</div>
      <div class="popup-content">
        <div class="popup-title">${POPUP_TITLES[type]||'Notice'}</div>
        <div class="popup-msg">${message}</div>
      </div>
      <button class="popup-close" onclick="closePopup(this.closest('.popup'))">×</button>
    </div>
    <div class="popup-progress"><div class="popup-bar" style="animation-duration:${duration}ms"></div></div>`;
  container.appendChild(popup);
  const timer=setTimeout(()=>closePopup(popup),duration);
  popup._timer=timer;
}

function closePopup(popup){
  if(!popup||popup._closing)return;
  popup._closing=true;
  clearTimeout(popup._timer);
  popup.classList.add('removing');
  popup.addEventListener('animationend',()=>popup.remove(),{once:true});
  setTimeout(()=>{if(popup.parentNode)popup.remove();},400);
}

function showToast(msg,type='success'){showPopup(msg,type,3000);}

/* ── CLIPBOARD ─────────────────────────────── */
async function copyText(text,label){
  try{await navigator.clipboard.writeText(text);}
  catch{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();}
  showPopup(`${label} copied to clipboard`,'success',2500);
}

/* ── PASSWORD OPS ──────────────────────────── */
async function revealPassword(entryId,btn){
  const field=document.getElementById(`pwd-val-${entryId}`);
  if(field.dataset.revealed==='true'){field.textContent='••••••••';field.dataset.revealed='false';btn.textContent='👁';return;}
  btn.textContent='⏳';
  const res=await fetch(`/password/${entryId}/`);
  const data=await res.json();
  field.textContent=data.password;field.dataset.revealed='true';btn.textContent='🙈';
}
async function copyPassword(entryId){
  const res=await fetch(`/password/${entryId}/`);
  const data=await res.json();
  copyText(data.password,'Password');
}

/* ── FAVORITES ─────────────────────────────── */
async function toggleFavorite(entryId,btn){
  const prev=btn.style.transform;
  btn.style.transform='scale(1.4) rotate(-10deg)';
  const res=await fetch(`/favorite/${entryId}/`,{method:'POST',headers:{'X-CSRFToken':getCookie('csrftoken')}});
  const data=await res.json();
  btn.classList.toggle('fav-active',data.is_favorite);
  btn.textContent=data.is_favorite?'★':'☆';
  setTimeout(()=>{btn.style.transform='';},300);
  showPopup(data.is_favorite?'Added to favorites':'Removed from favorites',data.is_favorite?'success':'info',2500);
}

/* ── UTILS ─────────────────────────────────── */
function getCookie(name){const c=document.cookie.split(';').find(c=>c.trim().startsWith(name+'='));return c?decodeURIComponent(c.split('=')[1]):'';}

function confirmDelete(formId){
  const overlay=document.createElement('div');
  overlay.className='modal-overlay';
  overlay.innerHTML=`<div class="modal"><div class="modal-title">🗑 Delete Entry</div><div class="modal-body">Are you sure you want to delete this entry? This cannot be undone.</div><div class="modal-actions"><button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">Cancel</button><button class="btn btn-danger" onclick="document.getElementById('${formId}').submit()">Delete</button></div></div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove();});
}

/* ── PASSWORD STRENGTH ─────────────────────── */
function checkStrength(val){let s=0;if(val.length>=8)s++;if(val.length>=12)s++;if(/[A-Z]/.test(val))s++;if(/[0-9]/.test(val))s++;if(/[^A-Za-z0-9]/.test(val))s++;return s;}
function updateStrength(input){
  const bar=document.querySelectorAll('.pwd-strength-seg');
  const label=document.querySelector('.pwd-strength-label');
  const score=checkStrength(input.value);
  const colors=['','#EF4444','#F59E0B','#F59E0B','#10B981','#10B981'];
  const labels=['','Weak','Fair','Good','Strong','Very Strong'];
  bar.forEach((seg,i)=>{seg.style.background=i<score?colors[score]:'';});
  if(label)label.textContent=input.value?labels[score]:'';
}
function togglePassword(inputId){const input=document.getElementById(inputId);input.type=input.type==='password'?'text':'password';}
function generatePassword(inputId){
  const chars='abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()-_=+';
  let pwd='';for(let i=0;i<16;i++)pwd+=chars[Math.floor(Math.random()*chars.length)];
  const input=document.getElementById(inputId);input.value=pwd;input.type='text';updateStrength(input);
}

/* ── INIT ──────────────────────────────────── */
document.addEventListener('DOMContentLoaded',()=>{

  /* Loading buttons on form submit */
  document.querySelectorAll('form').forEach(form=>{
    form.addEventListener('submit',function(){
      const btn=form.querySelector('button.btn-primary');
      if(btn&&!btn.querySelector('.btn-spinner')){
        const sp=document.createElement('span');
        sp.className='btn-spinner';
        sp.innerHTML='<span></span><span></span><span></span>';
        btn.appendChild(sp);
      }
      const btn2=form.querySelector('button.btn-primary');
      if(btn2)setTimeout(()=>{btn2.classList.add('btn-loading');},60);
    });
  });

  /* Stat count-up */
  document.querySelectorAll('.stat-value[data-count]').forEach(el=>{
    const target=parseInt(el.dataset.count,10);
    if(isNaN(target))return;
    let s=0;const step=Math.max(1,Math.ceil(target/40));
    const tick=()=>{s=Math.min(s+step,target);el.textContent=s;if(s<target)requestAnimationFrame(tick);};
    requestAnimationFrame(tick);
  });

  /* Ripple on buttons */
  document.querySelectorAll('.btn').forEach(btn=>{
    btn.addEventListener('click',e=>{
      const rect=btn.getBoundingClientRect();
      const ripple=document.createElement('span');
      ripple.style.cssText=`position:absolute;border-radius:50%;width:8px;height:8px;background:rgba(255,255,255,.3);top:${e.clientY-rect.top-4}px;left:${e.clientX-rect.left-4}px;transform:scale(0);animation:ripple .5s ease-out forwards;pointer-events:none`;
      btn.appendChild(ripple);
      ripple.addEventListener('animationend',()=>ripple.remove());
    });
  });

  /* Copy btn flash */
  document.querySelectorAll('.copy-btn').forEach(btn=>{
    btn.addEventListener('click',function(){
      const orig=this.textContent;
      this.textContent='✓';this.classList.add('copied');
      setTimeout(()=>{this.textContent=orig;this.classList.remove('copied');},1400);
    });
  });
});
</script>
</body>
</html>
