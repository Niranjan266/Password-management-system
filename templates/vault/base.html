<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}VaultX — Password Manager{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-base: #080B14;
  --bg-surface: #0E1422;
  --bg-card: #131929;
  --bg-hover: #1A2235;
  --border: #1E2D47;
  --border-bright: #2A3F5F;
  --accent: #4F8EFF;
  --accent-dim: #1E3A6E;
  --accent-glow: rgba(79,142,255,0.18);
  --teal: #0FD4C1;
  --purple: #8B5CF6;
  --rose: #F43F5E;
  --amber: #F59E0B;
  --green: #10B981;
  --text-primary: #EEF2FF;
  --text-secondary: #8899B4;
  --text-muted: #4A5A78;
  --radius: 12px;
  --radius-lg: 18px;
  --shadow: 0 4px 24px rgba(0,0,0,0.5);
  --font-display: 'Space Grotesk', sans-serif;
  --font-body: 'Inter', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background: var(--bg-base);
  color: var(--text-primary);
  min-height: 100vh;
  line-height: 1.6;
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-base); }
::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 3px; }

/* LAYOUT */
.app-layout { display: flex; min-height: 100vh; }

/* SIDEBAR */
.sidebar {
  width: 260px;
  min-width: 260px;
  background: var(--bg-surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 0;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
}

.sidebar-logo {
  padding: 24px 20px 20px;
  border-bottom: 1px solid var(--border);
}

.logo-mark {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 700;
  color: var(--text-primary);
  text-decoration: none;
}

.logo-icon {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, var(--accent), var(--teal));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  box-shadow: 0 0 20px var(--accent-glow);
}

.logo-sub {
  font-size: 11px;
  font-weight: 400;
  color: var(--text-muted);
  letter-spacing: 0.05em;
  display: block;
  line-height: 1;
  margin-top: 2px;
}

.sidebar-user {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}

.user-pill {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  background: var(--bg-card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
}

.user-avatar {
  width: 32px;
  height: 32px;
  background: linear-gradient(135deg, var(--purple), var(--accent));
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 600;
  color: #fff;
  flex-shrink: 0;
}

.user-info { flex: 1; min-width: 0; }
.user-name { font-size: 13px; font-weight: 600; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-role { font-size: 11px; color: var(--text-muted); }

.sidebar-nav { flex: 1; padding: 16px 12px; overflow-y: auto; }

.nav-section-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0 8px;
  margin-bottom: 6px;
  margin-top: 16px;
}
.nav-section-label:first-child { margin-top: 0; }

.nav-link {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border-radius: 9px;
  color: var(--text-secondary);
  text-decoration: none;
  font-size: 13.5px;
  font-weight: 500;
  transition: all 0.15s;
  margin-bottom: 2px;
  cursor: pointer;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
}

.nav-link:hover { background: var(--bg-hover); color: var(--text-primary); }
.nav-link.active { background: var(--accent-dim); color: var(--accent); }
.nav-link .nav-icon { font-size: 15px; width: 20px; text-align: center; flex-shrink: 0; }
.nav-link .nav-badge {
  margin-left: auto;
  background: var(--accent);
  color: #fff;
  font-size: 10px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 20px;
  min-width: 20px;
  text-align: center;
}

.sidebar-footer {
  padding: 16px 12px;
  border-top: 1px solid var(--border);
}

/* MAIN CONTENT */
.main-content {
  margin-left: 260px;
  flex: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* TOPBAR */
.topbar {
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 28px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 50;
}

.topbar-title {
  font-family: var(--font-display);
  font-size: 17px;
  font-weight: 600;
  color: var(--text-primary);
  flex: 1;
}

.page-body { padding: 28px; flex: 1; }

/* SEARCH */
.search-wrap {
  position: relative;
  flex: 1;
  max-width: 380px;
}

.search-wrap input {
  width: 100%;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 9px;
  padding: 9px 14px 9px 38px;
  color: var(--text-primary);
  font-size: 13px;
  font-family: var(--font-body);
  transition: border-color 0.2s;
  outline: none;
}

.search-wrap input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.search-wrap input::placeholder { color: var(--text-muted); }

.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  font-size: 14px;
  pointer-events: none;
}

/* BUTTONS */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 9px 18px;
  border-radius: 9px;
  font-size: 13.5px;
  font-weight: 600;
  font-family: var(--font-body);
  cursor: pointer;
  transition: all 0.15s;
  text-decoration: none;
  border: none;
  outline: none;
}

.btn-primary {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 0 20px rgba(79,142,255,0.3);
}
.btn-primary:hover { background: #6BA3FF; box-shadow: 0 0 28px rgba(79,142,255,0.5); transform: translateY(-1px); }

.btn-secondary {
  background: var(--bg-card);
  color: var(--text-secondary);
  border: 1px solid var(--border);
}
.btn-secondary:hover { background: var(--bg-hover); color: var(--text-primary); border-color: var(--border-bright); }

.btn-danger {
  background: transparent;
  color: var(--rose);
  border: 1px solid rgba(244,63,94,0.3);
}
.btn-danger:hover { background: rgba(244,63,94,0.1); }

.btn-ghost {
  background: transparent;
  color: var(--text-secondary);
  padding: 7px 10px;
}
.btn-ghost:hover { color: var(--text-primary); background: var(--bg-hover); }

.btn-sm { padding: 6px 13px; font-size: 12.5px; }
.btn-icon { padding: 8px; border-radius: 8px; }

/* CARDS */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.card:hover { border-color: var(--border-bright); }

/* STATS */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-bottom: 28px;
}

.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px 22px;
  position: relative;
  overflow: hidden;
}

.stat-card::before {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 80px; height: 80px;
  border-radius: 50%;
  opacity: 0.06;
  transform: translate(20px, -20px);
}

.stat-card.blue::before { background: var(--accent); }
.stat-card.teal::before { background: var(--teal); }
.stat-card.purple::before { background: var(--purple); }

.stat-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; margin-bottom: 8px; }
.stat-value { font-family: var(--font-display); font-size: 32px; font-weight: 700; color: var(--text-primary); line-height: 1; }
.stat-icon { position: absolute; top: 18px; right: 20px; font-size: 22px; opacity: 0.5; }

/* CATEGORY FILTER */
.category-filter {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}

.cat-chip {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.15s;
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-secondary);
}

.cat-chip:hover { border-color: var(--accent); color: var(--accent); }
.cat-chip.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }

/* PASSWORD GRID */
.pwd-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 14px;
}

/* PASSWORD CARD */
.pwd-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 18px;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}

.pwd-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--card-accent, var(--accent));
  opacity: 0;
  transition: opacity 0.2s;
}

.pwd-card:hover { border-color: var(--border-bright); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
.pwd-card:hover::before { opacity: 1; }

.pwd-card-header {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 14px;
}

.pwd-platform-icon {
  width: 42px;
  height: 42px;
  background: var(--bg-hover);
  border-radius: 11px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
  border: 1px solid var(--border);
}

.pwd-platform-info { flex: 1; min-width: 0; }
.pwd-platform-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
  font-family: var(--font-display);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.pwd-category-badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 20px;
  margin-top: 3px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.pwd-actions { display: flex; gap: 4px; margin-left: auto; }

.action-btn {
  width: 30px;
  height: 30px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  cursor: pointer;
  background: transparent;
  border: none;
  color: var(--text-muted);
  transition: all 0.15s;
  text-decoration: none;
}

.action-btn:hover { background: var(--bg-hover); color: var(--text-secondary); }
.action-btn.fav-active { color: var(--amber); }
.action-btn.fav-active:hover { color: var(--amber); }

.pwd-field {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 9px;
  padding: 10px 12px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.pwd-field-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.07em; font-weight: 600; margin-bottom: 2px; }
.pwd-field-value { font-size: 13px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
.pwd-masked { font-family: monospace; letter-spacing: 3px; color: var(--text-muted); }

.copy-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-muted);
  font-size: 12px;
  padding: 4px;
  border-radius: 5px;
  transition: all 0.15s;
  flex-shrink: 0;
}
.copy-btn:hover { color: var(--accent); background: var(--accent-dim); }

.pwd-url {
  font-size: 12px;
  color: var(--accent);
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  margin-top: 6px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 100%;
}

.pwd-url:hover { text-decoration: underline; }

/* FORM STYLES */
.form-page {
  max-width: 580px;
  margin: 0 auto;
}

.form-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 32px;
}

.form-title {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 24px;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  gap: 10px;
}

.form-row { margin-bottom: 18px; }
.form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

label {
  display: block;
  font-size: 12.5px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

input[type="text"], input[type="password"], input[type="email"],
input[type="url"], select, textarea {
  width: 100%;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 9px;
  padding: 11px 14px;
  color: var(--text-primary);
  font-size: 14px;
  font-family: var(--font-body);
  transition: border-color 0.2s, box-shadow 0.2s;
  outline: none;
  appearance: none;
}

input:focus, select:focus, textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

input::placeholder, textarea::placeholder { color: var(--text-muted); }

select option { background: var(--bg-card); }

textarea { resize: vertical; min-height: 90px; }

.input-with-btn {
  position: relative;
}

.input-with-btn input { padding-right: 44px; }
.input-inner-btn {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-muted);
  font-size: 14px;
  padding: 4px 6px;
  border-radius: 6px;
  transition: color 0.15s;
}
.input-inner-btn:hover { color: var(--accent); }

.form-actions {
  display: flex;
  gap: 12px;
  padding-top: 8px;
}

.checkbox-row {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
}

.checkbox-row input[type="checkbox"] {
  width: 16px;
  height: 16px;
  accent-color: var(--accent);
  cursor: pointer;
}

.checkbox-row span {
  font-size: 13.5px;
  color: var(--text-secondary);
  font-weight: 500;
  user-select: none;
}

.error-msg { color: var(--rose); font-size: 12px; margin-top: 5px; }
.errorlist { list-style: none; margin: 0; padding: 0; }
.errorlist li { color: var(--rose); font-size: 12px; margin-top: 4px; }

/* AUTH PAGES */
.auth-page {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-base);
  padding: 20px;
  position: relative;
  overflow: hidden;
}

.auth-bg-glow {
  position: absolute;
  width: 600px;
  height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(79,142,255,0.08), transparent 70%);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}

.auth-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 40px;
  width: 100%;
  max-width: 440px;
  position: relative;
  box-shadow: 0 24px 80px rgba(0,0,0,0.6);
}

.auth-logo {
  text-align: center;
  margin-bottom: 28px;
}

.auth-logo .logo-mark {
  justify-content: center;
  font-size: 22px;
  margin-bottom: 6px;
}

.auth-logo-desc {
  font-size: 13px;
  color: var(--text-muted);
}

.auth-title {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 6px;
  color: var(--text-primary);
}

.auth-subtitle {
  font-size: 13.5px;
  color: var(--text-secondary);
  margin-bottom: 28px;
}

.auth-footer-link {
  text-align: center;
  margin-top: 22px;
  font-size: 13px;
  color: var(--text-muted);
}

.auth-footer-link a { color: var(--accent); text-decoration: none; font-weight: 600; }
.auth-footer-link a:hover { text-decoration: underline; }

/* MESSAGES */
.messages-bar {
  padding: 14px 28px 0;
}

.msg {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 14px;
  border-radius: 9px;
  font-size: 13.5px;
  font-weight: 500;
  margin-bottom: 8px;
}

.msg.success { background: rgba(16,185,129,0.12); color: #34D399; border: 1px solid rgba(16,185,129,0.2); }
.msg.error { background: rgba(244,63,94,0.12); color: #FB7185; border: 1px solid rgba(244,63,94,0.2); }
.msg.info { background: rgba(79,142,255,0.12); color: #7BA5FF; border: 1px solid rgba(79,142,255,0.2); }

/* EMPTY STATE */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}

.empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
.empty-title { font-size: 18px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; }
.empty-desc { font-size: 14px; margin-bottom: 24px; }

/* SECTION HEADER */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.section-title {
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-count {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  background: var(--bg-hover);
  padding: 2px 8px;
  border-radius: 20px;
}

/* DIVIDER */
.divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 24px 0;
}

/* TOAST */
.toast-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.toast {
  background: var(--bg-card);
  border: 1px solid var(--border-bright);
  border-radius: 12px;
  padding: 12px 18px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-primary);
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  gap: 8px;
  animation: slideIn 0.3s ease;
  max-width: 280px;
}

.toast.success { border-color: rgba(16,185,129,0.4); color: #34D399; }

@keyframes slideIn {
  from { opacity: 0; transform: translateX(20px); }
  to { opacity: 1; transform: translateX(0); }
}

/* MODAL */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.modal {
  background: var(--bg-card);
  border: 1px solid var(--border-bright);
  border-radius: var(--radius-lg);
  padding: 28px;
  max-width: 440px;
  width: 100%;
  box-shadow: 0 24px 60px rgba(0,0,0,0.7);
}

.modal-title {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 8px;
  color: var(--text-primary);
}

.modal-body { color: var(--text-secondary); font-size: 14px; margin-bottom: 24px; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

/* PASSWORD STRENGTH */
.pwd-strength { margin-top: 8px; }
.pwd-strength-bar { display: flex; gap: 3px; height: 4px; border-radius: 2px; overflow: hidden; }
.pwd-strength-seg { flex: 1; background: var(--border); border-radius: 2px; transition: background 0.3s; }
.pwd-strength-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

/* RESPONSIVE */
@media (max-width: 900px) {
  .sidebar { width: 220px; min-width: 220px; }
  .main-content { margin-left: 220px; }
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .form-row-2 { grid-template-columns: 1fr; }
}

@media (max-width: 640px) {
  .sidebar { display: none; }
  .main-content { margin-left: 0; }
  .stats-grid { grid-template-columns: 1fr; }
  .pwd-grid { grid-template-columns: 1fr; }
  .page-body { padding: 16px; }
}
</style>
</head>
<body>
{% block body %}{% endblock %}

<div class="toast-container" id="toastContainer"></div>

<script>
function showToast(msg, type='success') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<span>${type === 'success' ? '✓' : 'ℹ'}</span> ${msg}`;
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

async function copyText(text, label) {
  try {
    await navigator.clipboard.writeText(text);
    showToast(`${label} copied!`);
  } catch(e) {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
    showToast(`${label} copied!`);
  }
}

async function revealPassword(entryId, btn) {
  const field = document.getElementById(`pwd-val-${entryId}`);
  if (field.dataset.revealed === 'true') {
    field.textContent = '••••••••';
    field.dataset.revealed = 'false';
    btn.textContent = '👁';
    return;
  }
  const res = await fetch(`/password/${entryId}/`);
  const data = await res.json();
  field.textContent = data.password;
  field.dataset.revealed = 'true';
  btn.textContent = '🙈';
}

async function copyPassword(entryId) {
  const res = await fetch(`/password/${entryId}/`);
  const data = await res.json();
  copyText(data.password, 'Password');
}

async function toggleFavorite(entryId, btn) {
  const res = await fetch(`/favorite/${entryId}/`, { method: 'POST', headers: {'X-CSRFToken': getCookie('csrftoken')} });
  const data = await res.json();
  btn.classList.toggle('fav-active', data.is_favorite);
  btn.textContent = data.is_favorite ? '★' : '☆';
  showToast(data.is_favorite ? 'Added to favorites' : 'Removed from favorites');
}

function getCookie(name) {
  let c = document.cookie.split(';').find(c => c.trim().startsWith(name+'='));
  return c ? decodeURIComponent(c.split('=')[1]) : '';
}

function confirmDelete(formId) {
  document.getElementById(formId).submit();
}

// Password strength checker
function checkStrength(val) {
  let score = 0;
  if (val.length >= 8) score++;
  if (val.length >= 12) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;
  return score;
}

function updateStrength(input) {
  const bar = document.querySelectorAll('.pwd-strength-seg');
  const label = document.querySelector('.pwd-strength-label');
  const score = checkStrength(input.value);
  const colors = ['', '#EF4444','#F59E0B','#F59E0B','#10B981','#10B981'];
  const labels = ['','Weak','Fair','Good','Strong','Very Strong'];
  bar.forEach((seg, i) => { seg.style.background = i < score ? colors[score] : ''; });
  if (label) label.textContent = input.value ? labels[score] : '';
}

function togglePassword(inputId) {
  const input = document.getElementById(inputId);
  input.type = input.type === 'password' ? 'text' : 'password';
}

function generatePassword(inputId) {
  const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()-_=+';
  let pwd = '';
  for (let i = 0; i < 16; i++) pwd += chars[Math.floor(Math.random() * chars.length)];
  const input = document.getElementById(inputId);
  input.value = pwd;
  input.type = 'text';
  updateStrength(input);
}
</script>
</body>
</html>
